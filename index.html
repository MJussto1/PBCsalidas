<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="15"> 
    <title>FIDS - SALIDAS</title>
    <style>
        body { background-color: #000000; color: #FFFFFF; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; overflow: hidden; }
        
        /* HEADER CON LOGOS AJUSTADOS (MÁS GRANDES) */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #FFB300; padding-bottom: 15px; margin-bottom: 25px; }
        .logos-izquierda { display: flex; align-items: center; gap: 25px; }
        .logo-top-aip { max-height: 120px; width: auto; } /* Modifica aquí el tamaño del logo AIP */
        .logo-top-gmm { max-height: 120px; width: auto; border-radius: 6px; } /* Modifica aquí el tamaño del logo GMM */
        .header h1 { margin: 0; color: #FFB300; font-size: 3rem; text-transform: uppercase; font-weight: 800; }
        .clock { color: #FFFFFF; font-size: 3.5rem; font-weight: bold; }
        
        .fids-section { width: 100%; }
        
        table { width: 100%; border-collapse: collapse; font-size: 2.6rem; font-weight: bold; }
        th { text-align: left; color: #8E8E93; border-bottom: 3px solid #2C2C2E; padding: 14px; font-size: 1.8rem; text-transform: uppercase; }
        td { padding: 22px 14px; border-bottom: 1px solid #1C1C1E; vertical-align: middle; }
        
        .vuelo { color: #FFB300; }
        .destino { color: #FFFFFF; }
        .hora { color: #FFFFFF; }
        .sala { color: #FFFFFF; }
        .estatus { text-transform: uppercase; }
        .estatus-a-tiempo { color: #00FF00; }
        .estatus-demorado { color: #FF3B30; }
        
        /* LOGOS INTERNOS DE AEROLÍNEA AJUSTADOS (MÁS GRANDES) */
        .logo-aerolinea { max-height: 55px; width: auto; display: block; } /* Modifica aquí el tamaño de Volaris/Viva/United */
        
        .resaltado { background-color: #b45309 !important; animation: blink 2s infinite; }
        .resaltado td, .resaltado .vuelo { color: #ffffff !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logos-izquierda">
            <img src="recursos/logoAIP.png" alt="Logo AIP" class="logo-top-aip">
            <img src="recursos/LogoGMM.jpg" alt="Logo GMM" class="logo-top-gmm">
            <h1>Salidas / Departures</h1>
        </div>
        <div class="clock" id="liveClock">00:00</div>
    </div>

    <div class="fids-section">
        <table>
            <thead>
                <tr>
                    <th>Destino</th><th>Aerolínea</th><th>Vuelo</th><th>Hora</th><th>Puerta</th><th>Estatus</th>
                </tr>
            </thead>
            <tbody>
                <tr class="">
                    <td class="vuelo">TIJ</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea"></td>
                    <td class="destino">3223</td>
                    <td class="hora">17:45:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">BJX</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea"></td>
                    <td class="destino">604</td>
                    <td class="hora">19:00:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">GDL</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea"></td>
                    <td class="destino">1397</td>
                    <td class="hora">20:18:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">TIJ</td>
                    <td><img src="recursos/VI.png" alt="Viva" class="logo-aerolinea"></td>
                    <td class="destino">5117</td>
                    <td class="hora">21:35:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">GDL</td>
                    <td><img src="recursos/v.png" alt="Volaris" class="logo-aerolinea"></td>
                    <td class="destino">3245</td>
                    <td class="hora">21:50:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
                <tr class="">
                    <td class="vuelo">MTY</td>
                    <td><img src="recursos/VI.png" alt="Viva" class="logo-aerolinea"></td>
                    <td class="destino">4009</td>
                    <td class="hora">22:55:00</td>
                    <td class="sala"></td>
                    <td class="estatus estatus-a-tiempo">A TIEMPO</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
